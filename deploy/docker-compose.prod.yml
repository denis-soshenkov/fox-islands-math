# Прод-стек на VPS: игра + сервис авторизации + Caddy с автоматическим HTTPS.
# Запуск на сервере: docker compose -f deploy/docker-compose.prod.yml up -d --build
# Секрет FIREBASE_SERVICE_ACCOUNT_JSON compose берёт из deploy/.env
# (каталог compose-файла; rsync-деплой файлы .env* не трогает)
services:
  game:
    build:
      context: ..
    image: fox-islands-math:prod
    container_name: fox-islands-game
    restart: unless-stopped
    expose:
      - "80"

  auth:
    build:
      context: ../server
    image: fox-islands-auth:prod
    container_name: fox-islands-auth
    restart: unless-stopped
    environment:
      - FIREBASE_SERVICE_ACCOUNT_JSON=${FIREBASE_SERVICE_ACCOUNT_JSON:-}
    expose:
      - "8080"

  caddy:
    image: caddy:2-alpine
    container_name: fox-islands-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
